<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UlisesHD | Portafolio</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/intro.css">
  <link rel="stylesheet" href="css/hero.css">

  <script src="js/navbar.js" type="module"></script>
</head>
<body>

  <!-- ══ INTRO OVERLAY ══ -->
  <div id="intro-overlay">
    <canvas id="intro-canvas"></canvas>
    <div id="intro-logo-wrap">
      <div class="intro-circle">
        <img id="intro-logo-img" src="img/LogoHDBlack.png" alt="HD">
      </div>
    </div>
    <div id="intro-big-logo">
      <img id="intro-big-img" src="img/LogoHDBlack.png" alt="HD">
    </div>
    <span class="intro-skip">CLICK TO SKIP</span>
  </div>

  <!-- HERO -->
  <section id="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-content">
      <h1 class="hero-title hero-reveal" style="--d:0ms">
        ULISES<img src="img/LogoHDWhite.png" alt="HD" class="hero-logo-inline">
      </h1>
      <p class="hero-subtitle hero-reveal" style="--d:180ms">PORTAFOLIO</p>
      <a href="main.html" class="hero-cta hero-reveal" id="hero-start" style="--d:360ms">
        START <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="js/intro.js"></script>
  <script src="js/hero.js"></script>

</body>
</html>
